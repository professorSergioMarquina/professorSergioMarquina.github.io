<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="style.css">
	<script src="script.js" defer></script>
</head>
<body>
	<table border="4">
		<tr>
			<td colspan="4">
				<input type="text" id="result">
			</td>
		</tr>
		<tr>
			<td><button class="operator" id="percentage">%</button></td>
			<td><button class="clear" id="ce">CE</button></td>
			<td><button class="clear" id="c">C</button></td>
			<td><button class="backspace" id="bs">🔙</button></td>
		</tr>
		<tr>
			<td><button class="function" id="onebyx"><sup>1</sup>/<sub>x</sub></button></td>
			<td><button class="function" id="xsquare">x<sup>2</sup></button></td>
			<td><button class="function" id="squareroot">SQRT</button></td>
			<td><button class="operator" id="division">/</button></td>
			</tr>
		<tr>
			<td><button class="number" id="seven">7</button></td>
			<td><button class="number" id="eight">8</button></td>
			<td><button class="number" id="nine">9</button></td>
			<td><button class="operator" id="multiply">*</button></td>
		</tr>
		<tr>
			<td><button class="number" id="four">4</button></td>
			<td><button class="number" id="five">5</button></td>
			<td><button class="number" id="six">6</button></td>
			<td><button class="operator" id="subtraction">-</button></td>
		</tr>
		<tr>
			<td><button class="number" id="one">1</button></td>
			<td><button class="number" id="two">2</button></td>
			<td><button class="number" id="three">3</button></td>
			<td><button class="operator" id="addition">+</button></td>
		</tr>
		<tr>
			<td><button class="toggle-sign" id="plusmin"><sup>+</sup>/<sub>-</sub></button></td>
			<td><button class="number" id="zero">0</button></td>
			<td><button class="decimal" id="decm">.</button></td>
			<td><button class="equal" id="isequal">=</button></td>
		</tr>
	</table>
</body>
</html>
